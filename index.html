<!DOCTYPE html>
<html lang="pt br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula tabela</title>
    <link rel="stylesheet" href="style.css">     
    </style>
</head>
<body>
    <h1>Minha tabela</h1>
   
    
  <table border="6">
     <thead>
        <tr>
            <th>Produto</th>
            <th>Quantidade</th>
            <th>Preço</th>
            <th>Black flayd</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>produto 1</td>
            <td>2</td>
            <td>5$ </td>
            <td rowspan="2">Sim</td>

        </tr>
        <tr>
            <td>produto 2</td>
            <td>5</td>
            <td>5$</td>
            
        </tr>
        <tr>
            <td>produto 3</td>
            <td>3</td>
            <td>10$</td>
            <td>Não</td>
        </tr>
        <tfoot>
            <tr>
                <td colspan="3">Total</td>
                <td>20</td>
            </tr>
        </tfoot>
    </tbody>
 </table>








</body>
</html>
